<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blank Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <div class="discord-brand">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg" alt="Discord logo">
        <div>
          <h1>Continue with Discord</h1>
          <p>Link your Discord account with a real OAuth flow. A callback page will receive the auth code.</p>
        </div>
      </div>

      <button id="discord-start" class="discord-button">Continue with Discord</button>

      <div id="login-step" class="login-step hidden">
        <p class="login-step-text">Redirecting to Discord... if nothing happens, check your browser popup blocker.</p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
